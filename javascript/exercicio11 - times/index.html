<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Link Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />

    <!-- Link CSS -->

    <title>Exercicio 11 - Escalação de times</title>
  </head>
  <body>
    <h1>Escalação de times</h1>

    <section id="escalar">
      <h2>Escalar Jogador</h2>
      <br />

      <label for="position">Posição:</label> <br />
      <input type="text" name="position" id="position" />

      <br /><br />

      <label for="name">Nome do jogador:</label> <br />
      <input type="text" name="name" id="name" />

      <br /><br />

      <label for="number">Número da camisa:</label> <br />
      <input type="text" name="number" id="number" />

      <br /><br />
      <button onclick="escalarJogador()">escalar</button>
    </section>

    <br /><br /><br />

    <section id="remover">
      <h2>Remover Jogador</h2>
      <br />

      <label for="camisa">Número da camisa:</label> <br />
      <input type="text" name="camisa" id="camisa" />

      <br /><br />

      <button onclick="removerJogador()">Remover jogador</button>
    </section>

    <section id="time"></section>

    <!-- Link Javascript -->
    <script src="./assets/js/index.js"></script>
  </body>
